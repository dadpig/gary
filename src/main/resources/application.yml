spring:
  application:
    name: gary-assistant

  datasource:
    url: jdbc:h2:mem:garydb
    driver-class-name: org.h2.Driver
    username: gary
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  # Optimized HikariCP connection pool for virtual threads
  # Higher limits since virtual threads can handle more concurrent DB operations
  hikari:
    maximum-pool-size: 50
    minimum-idle: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
    leak-detection-threshold: 60000

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      # Optimized Lettuce connection pool for virtual threads
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

  cache:
    type: simple
    cache-names:
      - products
      - searches

server:
  port: 8080
  # Enable HTTP/2 for better performance (multiplexing, header compression)
  http2:
    enabled: true
  tomcat:
    threads:
      # Use virtual threads for Tomcat request handling (Java 21+)
      # This allows handling thousands of concurrent requests efficiently
      max: 200
      min-spare: 10
    connection-timeout: 30s
    max-connections: 10000
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Enable virtual threads globally for Spring MVC (Java 21+)
spring.threads.virtual.enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.gary.assistant: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Resilience4j Configuration for Rate Limiting and Circuit Breaking
resilience4j:
  ratelimiter:
    instances:
      scraperRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
      amazonScraper:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
      mercadoLivreScraper:
        limitForPeriod: 15
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
  circuitbreaker:
    instances:
      scraperCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s

gary:
  scraper:
    amazon:
      rate-limit: 10
      timeout: 30000
      user-agent: "Gary/1.0 (Shopping Assistant)"
    mercadolivre:
      rate-limit: 15
      timeout: 30000
      user-agent: "Gary/1.0 (Shopping Assistant)"
